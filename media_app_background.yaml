media_app_background:
  name: Media App Background
  version: '1.9'
  creator: Christopher Young
  supported:
    - media-player
  description: |
    Shows a branded ambient background on a media player card when the
    integration cannot provide cover art (e.g. DRM-protected content on
    an Android TV / Nvidia Shield).

    When the entity has a live entity_picture (e.g. YouTube), the module
    steps aside and Bubble Card's native cover-art system takes over.

    Built-in gradient backgrounds and logos are included for: Netflix,
    Prime Video, Disney+, HBO/Max, Apple TV+, Hulu, Peacock, ESPN, NBA,
    NFL, Plex, and Fandango at Home (Vudu).

    Configure via the editor below, or directly in YAML:

    <code-block><pre>
    media_app_background:
        source_attribute: app_id
        show_when_paused: true
        default_image: /local/bubble_media_bg/fallback.jpg
    </pre></code-block>

    Note: enable cover_background on the media player card for best
    results — when real cover art is available it will automatically
    overlay and hide this module's background.
  code: |-
    ${(() => {
      const cfg = this.config?.media_app_background ?? {};

      /* ── Active-state gate ───────────────────────────────── */
      const activeStates = ['playing'];
      if (cfg.show_when_paused !== false) activeStates.push('paused');
      if (cfg.show_when_idle === true) activeStates.push('idle');
      if (!activeStates.includes(state)) return '';

      /* ── Read configured source attribute ────────────────── */
      const srcEntity = cfg.source_entity || entity;
      const srcAttr   = cfg.source_attribute || 'app_id';
      const srcValue  = String(hass.states[srcEntity]?.attributes?.[srcAttr] ?? '').toLowerCase();
      if (!srcValue) return '';

      /* ── Built-in SVG data URIs (brand gradients) ─────────
         Source SVGs live in device_state_media_images/ in the repo.
         These are their base64-encoded equivalents.           */
      const BUILTIN = {
        netflix: 'data:image/svg+xml;base64,',
        prime:   'data:image/svg+xml;base64,',
        disney:  'data:image/svg+xml;base64,',
        max:     'data:image/svg+xml;base64,',
        appletv: 'data:image/svg+xml;base64,',
        hulu:    'data:image/svg+xml;base64,',
        peacock: 'data:image/svg+xml;base64,',
        espn:    'data:image/svg+xml;base64,',
        nba:     'data:image/svg+xml;base64,',
        plex:    'data:image/svg+xml;base64,',
        nfl:      'data:image/svg+xml;base64,',
        fandango: 'data:image/svg+xml;base64,',
      };

      /* ── Logo-only SVGs (transparent bg, applied via ::after on
         .bubble-media-player — outside cover_background's blur scope) */
      const LOGOS = {
        netflix: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjYuNSAyIDExIDIwIj48cGF0aCBkPSJNNi41LDJIMTAuNUwxMy40NCwxMC44M0wxMy41LDJIMTcuNVYyMkMxNi4yNSwyMS43OCAxNC44NywyMS42NCAxMy40MSwyMS41OEwxMC41LDEzTDEwLjQzLDIxLjU5QzkuMDMsMjEuNjUgNy43LDIxLjc5IDYuNSwyMlYyWiIgZmlsbD0id2hpdGUiLz48L3N2Zz4K',
        prime:   'data:image/svg+xml;base64,',
        appletv: 'data:image/svg+xml;base64,',
        hulu:    'data:image/svg+xml;base64,',
        max:     'data:image/svg+xml;base64,',
        disney:  'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+CiAgPGNpcmNsZSBjeD0iMTIiIGN5PSIxNSIgcj0iNyIgZmlsbD0id2hpdGUiLz4KICA8Y2lyY2xlIGN4PSI3LjUiIGN5PSI4LjUiIHI9IjQiIGZpbGw9IndoaXRlIi8+CiAgPGNpcmNsZSBjeD0iMTYuNSIgY3k9IjguNSIgcj0iNCIgZmlsbD0id2hpdGUiLz4KPC9zdmc+Cg==',
        espn:    'data:image/svg+xml;base64,',
        nba:     'data:image/svg+xml;base64,',
        peacock: 'data:image/svg+xml;base64,',
        nfl:     'data:image/svg+xml;base64,',
        plex:     'data:image/svg+xml;base64,',
        fandango: 'data:image/svg+xml;base64,',
      };

      /* ── Brand icon colours (applied to main icon when playing) */
      const ICON_COLORS = {
        netflix:  '#F07075',
        prime:    '#66CCEE',
        disney:   '#7089E2',
        max:      '#9B6BC4',
        appletv:  '#DDDDDD',
        hulu:     '#76EEB5',
        peacock:  '#66E4F5',
        espn:     '#E06666',
        nba:      '#7499C4',
        nfl:      '#E56C6C',
        plex:     '#F0C46C',
        fandango: '#FFA36B',
      };

      /* ── App keyword → service mapping ───────────────────── */
      const APPS = [
        { keys: ['netflix'],                       id: 'netflix',  field: 'netflix_image',  toggle: 'netflix_enabled'  },
        { keys: ['amazon', 'avod', 'primevideo', 'prime'], id: 'prime', field: 'prime_image', toggle: 'prime_enabled' },
        { keys: ['disney'],                        id: 'disney',   field: 'disney_image',   toggle: 'disney_enabled'   },
        { keys: ['hbo', 'wbd.max'],                id: 'max',      field: 'max_image',      toggle: 'max_enabled'      },
        { keys: ['apple', 'atve'],                 id: 'appletv',  field: 'appletv_image',  toggle: 'appletv_enabled'  },
        { keys: ['hulu'],                          id: 'hulu',     field: 'hulu_image',     toggle: 'hulu_enabled'     },
        { keys: ['peacock', 'nbcuni'],             id: 'peacock',  field: 'peacock_image',  toggle: 'peacock_enabled'  },
        { keys: ['espn'],                          id: 'espn',     field: 'espn_image',     toggle: 'espn_enabled'     },
        { keys: ['nba', 'nbaimd'],                 id: 'nba',      field: 'nba_image',      toggle: 'nba_enabled'      },
        { keys: ['plex'],                          id: 'plex',     field: 'plex_image',     toggle: 'plex_enabled'     },
        { keys: ['nfl', 'nflnetwork'],             id: 'nfl',      field: 'nfl_image',      toggle: 'nfl_enabled'      },
        { keys: ['fandango', 'vudu'],              id: 'fandango', field: 'fandango_image', toggle: 'fandango_enabled' },
      ];

      /* ── Match source value against keywords ─────────────── */
      let imageUrl = '';
      let matchedId = '';
      for (const app of APPS) {
        if (app.keys.some(function(k) { return srcValue.indexOf(k) !== -1; })) {
          if (cfg[app.toggle] === false) continue;
          imageUrl = cfg[app.field] || BUILTIN[app.id] || '';
          matchedId = app.id;
          break;
        }
      }

      /* ── Render background via ::before on the card wrapper.
         .bubble-background has filter:blur(50px);opacity:0.5 applied by
         Bubble Card's cover art system — setting background-image on it
         directly makes our gradient look dark and washed out. ::before
         sits outside that blur scope and renders at full fidelity.
         Bubble Card's crossfade layers sit on top via .bubble-background
         when cover_background:true, so real art still takes over cleanly. */
      const bgCss = (bgUrl, logoUrl) => {
        let css = '.bubble-media-player::before{content:\'\' !important;position:absolute !important;' +
          'inset:0 !important;background-image:url(\'' + bgUrl + '\') !important;' +
          'background-size:cover !important;background-position:center !important;' +
          'z-index:0 !important;pointer-events:none !important;}';
        if (logoUrl) {
          /* Logo ::after — also outside .bubble-background's blur scope */
          css += '.bubble-media-player::after{content:\'\' !important;position:absolute !important;' +
            'inset:0 !important;background-image:url(\'' + logoUrl + '\') !important;' +
            'background-size:auto 70% !important;background-position:center !important;' +
            'background-repeat:no-repeat !important;opacity:0.25 !important;pointer-events:none !important;}';
        }
        return css;
      };

      if (imageUrl) {
        let css = bgCss(imageUrl, LOGOS[matchedId] || '');
        if (state === 'playing' && cfg.icon_color_enabled !== false) {
          const iconColor = ICON_COLORS[matchedId];
          if (iconColor) {
            css += '.bubble-media-player .bubble-icon-container .bubble-icon{color:' + iconColor + ' !important;opacity:1 !important;}';
            css += '.bubble-sub-button .bubble-icon{color:unset !important;opacity:unset !important;}';
          }
        }
        return css;
      }

      /* ── Unrecognized app: step aside when native art is present ─── */
      const entityAttrs = hass.states[entity]?.attributes ?? {};
      if (entityAttrs.entity_picture_local || entityAttrs.entity_picture) return '';

      imageUrl = cfg.default_image || '';
      if (!imageUrl) return '';

      return bgCss(imageUrl);
    })()}
  editor:
    - name: source_entity
      label: App source entity (blank = use card entity)
      selector:
        entity: {}
    - name: source_attribute
      label: Attribute to match app name against
      default: app_id
      selector:
        select:
          custom_value: true
          options:
            - label: app_id — package name, most reliable (default)
              value: app_id
            - label: app_name — human-readable app name
              value: app_name
            - label: source — matches source_list entry
              value: source
    - name: show_when_paused
      label: Show background when paused
      default: true
      selector:
        boolean: {}
    - name: show_when_idle
      label: Show background when idle
      default: false
      selector:
        boolean: {}
    - name: icon_color_enabled
      label: Colour icon with service brand colour (playing only)
      default: true
      selector:
        boolean: {}
    - type: expandable
      title: Enabled services
      icon: mdi:toggle-switch
      schema:
        - type: grid
          column_min_width: 140px
          schema:
            - name: netflix_enabled
              label: Netflix
              default: true
              selector:
                boolean: {}
            - name: prime_enabled
              label: Prime Video
              default: true
              selector:
                boolean: {}
            - name: disney_enabled
              label: Disney+
              default: true
              selector:
                boolean: {}
            - name: max_enabled
              label: HBO / Max
              default: true
              selector:
                boolean: {}
            - name: appletv_enabled
              label: Apple TV+
              default: true
              selector:
                boolean: {}
            - name: hulu_enabled
              label: Hulu
              default: true
              selector:
                boolean: {}
            - name: peacock_enabled
              label: Peacock
              default: true
              selector:
                boolean: {}
            - name: espn_enabled
              label: ESPN
              default: true
              selector:
                boolean: {}
            - name: nba_enabled
              label: NBA
              default: true
              selector:
                boolean: {}
            - name: plex_enabled
              label: Plex
              default: true
              selector:
                boolean: {}
            - name: nfl_enabled
              label: NFL Network
              default: true
              selector:
                boolean: {}
            - name: fandango_enabled
              label: Fandango at Home
              default: true
              selector:
                boolean: {}
    - name: default_image
      label: Default background (unrecognized apps)
      selector:
        text: {}
