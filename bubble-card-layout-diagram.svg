<!-- ─── DOM TREE ─── -->
<text font-size="13" font-weight="500" fill="#1a1a1a" x="40" y="582">DOM hierarchy (shadow root)</text>
<text font-size="12" fill="#222" font-family="monospace" x="40"  y="602">ha-card</text>
<text font-size="12" fill="#444" font-family="monospace" x="40"  y="620">  └─ .bubble-button-card-container  (outer scroll/size boundary)</text>
<text font-size="12" fill="#0f6e56" font-family="monospace" x="40"  y="638">      ├─ .bubble-button-background  (abs. positioned color/image fill)</text>
<text font-size="12" fill="#0f6e56" font-family="monospace" x="40"  y="656">      ├─ .bubble-color-background  (state-reactive color overlay)</text>
<text font-size="12" fill="#534ab7" font-family="monospace" x="40"  y="674">      └─ .bubble-button-card  (CSS grid root → areas: i n a)</text>
<text font-size="12" fill="#d85a30" font-family="monospace" x="40"  y="692">          ├─ .bubble-icon-container  [grid-area: i]</text>
<text font-size="12" fill="#d85a30" font-family="monospace" x="40"  y="710">          │   └─ .icon-with-state → .bubble-icon  (&lt;ha-icon&gt;)</text>
<text font-size="12" fill="#185fa5" font-family="monospace" x="40"  y="728">          ├─ .bubble-name-container  [grid-area: n]</text>
<text font-size="12" fill="#185fa5" font-family="monospace" x="40"  y="746">          │   ├─ .bubble-name  ·  .bubble-state  ·  .bubble-attribute</text>
<text font-size="12" fill="#ba7517" font-family="monospace" x="40"  y="764">          └─ .bubble-sub-button-container  [grid-area: a]  (flex row)</text>
<text font-size="12" fill="#ba7517" font-family="monospace" x="40"  y="782">              └─ .bubble-sub-button ×N → .bubble-sub-button-icon  ·  .name-container</text>

