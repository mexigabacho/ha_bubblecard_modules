<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif;">
<!-- Cover Card Layout -->
<text font-size="15" font-weight="500" fill="#1a1a1a" x="40" y="32" text-anchor="start" font-family="sans-serif">Cover card</text>
<text font-size="12" font-weight="normal" fill="#666" x="124" y="32" text-anchor="start" font-family="sans-serif">(card_type: cover)</text>
<rect x="40" y="44" width="580" height="160" rx="12" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
<text font-size="11" font-weight="normal" fill="#5f5e5a" x="52" y="60" text-anchor="start" font-family="sans-serif">ha-card</text>
<text font-size="10" font-weight="normal" fill="#185fa5" x="52" y="74" text-anchor="start" font-family="sans-serif">.bubble-cover-container  [.is-on / .is-off]  [.large]</text>
<rect x="52" y="70" width="556" height="124" rx="8" fill="#e1f5ee" stroke="#5dcaa5" stroke-width="0.5" opacity="0.25"/>
<text font-size="10" font-weight="normal" fill="#0f6e56" x="62" y="84" text-anchor="start" font-family="sans-serif">.bubble-background  (absolute fill)</text>
<rect x="52" y="70" width="556" height="124" rx="8" fill="none" stroke="#a89fd8" stroke-width="1.5"/>
<rect x="64" y="84" width="100" height="100" rx="6" fill="#faece7" stroke="#d85a30" stroke-width="0.5"/>
<text font-size="10" font-weight="normal" fill="#993c1d" x="114" y="100" text-anchor="middle" font-family="sans-serif">.bubble-icon-container</text>
<text font-size="10" font-weight="normal" fill="#993c1d" x="114" y="114" text-anchor="middle" font-family="sans-serif">.bubble-icon</text>
<text font-size="10" font-weight="normal" fill="#993c1d" x="114" y="128" text-anchor="middle" font-family="sans-serif">(open/close icon)</text>
<rect x="172" y="84" width="180" height="60" rx="6" fill="#e6f1fb" stroke="#378add" stroke-width="0.5"/>
<text font-size="10" font-weight="normal" fill="#185fa5" x="262" y="100" text-anchor="middle" font-family="sans-serif">.bubble-name-container</text>
<text font-size="10" font-weight="normal" fill="#185fa5" x="262" y="114" text-anchor="middle" font-family="sans-serif">.bubble-name  /  .bubble-state</text>
<rect x="360" y="84" width="236" height="100" rx="6" fill="#e8f5fd" stroke="#4ba8d8" stroke-width="0.5"/>
<text font-size="10" font-weight="normal" fill="#1a6e9a" x="478" y="100" text-anchor="middle" font-family="sans-serif">.bubble-buttons-container</text>
<text font-size="9" font-weight="normal" fill="#888" x="478" y="112" text-anchor="middle" font-family="sans-serif">.bubble-buttons  .buttons-container</text>
<rect x="366" y="118" width="64" height="54" rx="4" fill="#e8f5fd" stroke="#4ba8d8" stroke-width="0.5"/>
<text font-size="10" font-weight="500" fill="#1a6e9a" x="398" y="136" text-anchor="middle" font-family="sans-serif">OPEN</text>
<text font-size="8" font-weight="normal" fill="#1a6e9a" x="398" y="148" text-anchor="middle" font-family="sans-serif">.bubble-open</text>
<text font-size="7" font-weight="normal" fill="#888" x="398" y="160" text-anchor="middle" font-family="sans-serif">[.disabled at fully open]</text>
<rect x="440" y="118" width="64" height="54" rx="4" fill="#e8f5fd" stroke="#4ba8d8" stroke-width="0.5"/>
<text font-size="10" font-weight="500" fill="#1a6e9a" x="472" y="136" text-anchor="middle" font-family="sans-serif">STOP</text>
<text font-size="8" font-weight="normal" fill="#1a6e9a" x="472" y="148" text-anchor="middle" font-family="sans-serif">.bubble-stop</text>
<text font-size="7" font-weight="normal" fill="#888" x="472" y="160" text-anchor="middle" font-family="sans-serif">[hidden if no STOP feature]</text>
<rect x="514" y="118" width="64" height="54" rx="4" fill="#e8f5fd" stroke="#4ba8d8" stroke-width="0.5"/>
<text font-size="10" font-weight="500" fill="#1a6e9a" x="546" y="136" text-anchor="middle" font-family="sans-serif">CLOSE</text>
<text font-size="8" font-weight="normal" fill="#1a6e9a" x="546" y="148" text-anchor="middle" font-family="sans-serif">.bubble-close</text>
<text font-size="7" font-weight="normal" fill="#888" x="546" y="160" text-anchor="middle" font-family="sans-serif">[.disabled at fully closed]</text>
<line x1="40" y1="222" x2="638" y2="222" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
<rect x="40" y="232" width="580" height="30" rx="6" fill="#fff5f5" stroke="#f87171" stroke-width="0.5"/>
<text font-size="11" font-weight="normal" fill="#c0392b" x="50" y="250" text-anchor="start" font-family="sans-serif">.disabled class: opacity:0.3 !important; pointer-events:none — added automatically when cover is fully open/closed</text>
<line x1="40" y1="278" x2="638" y2="278" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
<text font-size="13" font-weight="500" fill="#1a1a1a" x="40" y="304" text-anchor="start" font-family="sans-serif">DOM hierarchy</text>
<text font-size="12" font-weight="normal" fill="#222" x="40" y="324" text-anchor="start" font-family="monospace">ha-card</text>
<text font-size="12" font-weight="normal" fill="#222" x="40" y="342" text-anchor="start" font-family="monospace">  └─ .bubble-cover-container</text>
<text font-size="12" font-weight="normal" fill="#0f6e56" x="40" y="360" text-anchor="start" font-family="monospace">      ├─ .bubble-background</text>
<text font-size="12" font-weight="normal" fill="#534ab7" x="40" y="378" text-anchor="start" font-family="monospace">      └─ .bubble-cover  .bubble-wrapper</text>
<text font-size="12" font-weight="normal" fill="#993c1d" x="40" y="396" text-anchor="start" font-family="monospace">          ├─ .bubble-icon-container → .bubble-icon  (switches open/close icon)</text>
<text font-size="12" font-weight="normal" fill="#185fa5" x="40" y="414" text-anchor="start" font-family="monospace">          ├─ .bubble-name-container → .bubble-name  ·  .bubble-state</text>
<text font-size="12" font-weight="normal" fill="#1a6e9a" x="40" y="432" text-anchor="start" font-family="monospace">          └─ .bubble-buttons-container  .bubble-buttons  .buttons-container</text>
<text font-size="12" font-weight="normal" fill="#1a6e9a" x="40" y="450" text-anchor="start" font-family="monospace">              ├─ .bubble-cover-button  .bubble-open  [.disabled]</text>
<text font-size="12" font-weight="normal" fill="#1a6e9a" x="40" y="468" text-anchor="start" font-family="monospace">              │   └─ ha-icon.bubble-cover-button-icon  .bubble-icon-open</text>
<text font-size="12" font-weight="normal" fill="#1a6e9a" x="40" y="486" text-anchor="start" font-family="monospace">              ├─ .bubble-cover-button  .bubble-stop  [display:none if no STOP]</text>
<text font-size="12" font-weight="normal" fill="#1a6e9a" x="40" y="504" text-anchor="start" font-family="monospace">              └─ .bubble-cover-button  .bubble-close  [.disabled]</text>
<text font-size="12" font-weight="normal" fill="#1a6e9a" x="40" y="522" text-anchor="start" font-family="monospace">                  └─ ha-icon.bubble-cover-button-icon  .bubble-icon-close</text>
<rect x="40" y="560" width="580" height="18" rx="3" fill="#f5f5f0" stroke="#aaaaaa" stroke-width="0.5"/>
<text font-size="11" font-weight="normal" fill="#555" x="46" y="571" text-anchor="start" font-family="sans-serif">device_class: curtain → icons switch to arrow-expand-horizontal / arrow-collapse-horizontal</text>
</svg>
