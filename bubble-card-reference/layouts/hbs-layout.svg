<svg width="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif;">
<!-- Horizontal Buttons Stack Layout -->
<text font-size="15" font-weight="500" fill="#1a1a1a" x="40" y="32" text-anchor="start" font-family="sans-serif">Horizontal Buttons Stack</text>
<text font-size="12" font-weight="normal" fill="#666" x="236" y="32" text-anchor="start" font-family="sans-serif">(card_type: horizontal-buttons-stack)</text>
<text font-size="11" font-weight="normal" fill="#666" x="40" y="50" text-anchor="start" font-family="sans-serif">Fixed-position navigation bar. No sub-button support.</text>
<rect x="40" y="62" width="580" height="30" rx="8" fill="#f1f5e8" stroke="#9ab450" stroke-width="0.5"/>
<text font-size="10" font-weight="normal" fill="#3b6d11" x="50" y="80" text-anchor="start" font-family="sans-serif">ha-card  .horizontal-buttons-stack-card  [.has-gradient]</text>
<text font-size="9" font-weight="normal" fill="#888" x="460" y="80" text-anchor="start" font-family="sans-serif">position:fixed; bottom:16px; z-index:6</text>
<rect x="40" y="96" width="580" height="12" rx="3" fill="#e8fce8" stroke="#639922" stroke-width="0.5" opacity="0.5"/>
<text font-size="9" font-weight="normal" fill="#3b6d11" x="330" y="105" text-anchor="middle" font-family="sans-serif">::before — gradient fade above bar (when .has-gradient)</text>
<rect x="40" y="112" width="580" height="18" rx="4" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
<text font-size="9" font-weight="normal" fill="#555" x="330" y="125" text-anchor="middle" font-family="sans-serif">.card-content  (HA scroll wrapper)  [.is-scrolled]  [.is-maxed-scroll]  — mask-image gradient fades edges</text>
<rect x="40" y="134" width="580" height="130" rx="6" fill="#e6f1fb" stroke="#85b7eb" stroke-width="0.5"/>
<text font-size="10" font-weight="normal" fill="#185fa5" x="50" y="150" text-anchor="start" font-family="sans-serif">.bubble-horizontal-buttons-stack-card-container  .horizontal-buttons-stack-container</text>
<rect x="48" y="158" width="130" height="96" rx="6" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
<text font-size="9" font-weight="normal" fill="#854f0b" x="113" y="172" text-anchor="middle" font-family="sans-serif">.bubble-button  .bubble-button-1</text>
<text font-size="9" font-weight="normal" fill="#888" x="113" y="184" text-anchor="middle" font-family="sans-serif">.button  .&lt;link-hash&gt;</text>
<text font-size="8" font-weight="normal" fill="#639922" x="113" y="196" text-anchor="middle" font-family="sans-serif">[.highlight when URL matches]</text>
<text font-size="8" font-weight="normal" fill="#888" x="113" y="208" text-anchor="middle" font-family="sans-serif">position:absolute</text>
<text font-size="8" font-weight="normal" fill="#888" x="113" y="220" text-anchor="middle" font-family="sans-serif">transform:translateX(10px)</text>
<rect x="52" y="226" width="56" height="20" rx="3" fill="#faece7" stroke="#d85a30" stroke-width="0.5"/>
<text font-size="7" font-weight="normal" fill="#993c1d" x="80" y="239" text-anchor="middle" font-family="sans-serif">ha-icon.bubble-icon</text>
<rect x="114" y="226" width="56" height="20" rx="3" fill="#e1f5ee" stroke="#5dcaa5" stroke-width="0.5"/>
<text font-size="7" font-weight="normal" fill="#0f6e56" x="142" y="239" text-anchor="middle" font-family="sans-serif">.bubble-background</text>
