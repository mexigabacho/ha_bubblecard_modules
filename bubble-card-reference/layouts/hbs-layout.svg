<text font-size="9" font-weight="normal" fill="#888" x="255" y="184" text-anchor="middle" font-family="sans-serif">.button  .&lt;link-hash&gt;</text>
<text font-size="8" font-weight="normal" fill="#639922" x="255" y="196" text-anchor="middle" font-family="sans-serif">[.highlight when URL matches]</text>
<text font-size="8" font-weight="normal" fill="#888" x="255" y="208" text-anchor="middle" font-family="sans-serif">position:absolute</text>
<text font-size="8" font-weight="normal" fill="#888" x="255" y="220" text-anchor="middle" font-family="sans-serif">transform:translateX(152px)</text>
<rect x="194" y="226" width="56" height="20" rx="3" fill="#faece7" stroke="#d85a30" stroke-width="0.5"/>
<text font-size="7" font-weight="normal" fill="#993c1d" x="222" y="239" text-anchor="middle" font-family="sans-serif">ha-icon.bubble-icon</text>
<rect x="256" y="226" width="56" height="20" rx="3" fill="#e1f5ee" stroke="#5dcaa5" stroke-width="0.5"/>
<text font-size="7" font-weight="normal" fill="#0f6e56" x="284" y="239" text-anchor="middle" font-family="sans-serif">.bubble-background</text>
<rect x="332" y="158" width="130" height="96" rx="6" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
<text font-size="9" font-weight="normal" fill="#854f0b" x="397" y="172" text-anchor="middle" font-family="sans-serif">.bubble-button  .bubble-button-3</text>
<text font-size="9" font-weight="normal" fill="#888" x="397" y="184" text-anchor="middle" font-family="sans-serif">.button  .&lt;link-hash&gt;</text>
<text font-size="8" font-weight="normal" fill="#639922" x="397" y="196" text-anchor="middle" font-family="sans-serif">[.highlight when URL matches]</text>
<text font-size="8" font-weight="normal" fill="#888" x="397" y="208" text-anchor="middle" font-family="sans-serif">position:absolute</text>
<text font-size="8" font-weight="normal" fill="#888" x="397" y="220" text-anchor="middle" font-family="sans-serif">transform:translateX(294px)</text>
<rect x="336" y="226" width="56" height="20" rx="3" fill="#faece7" stroke="#d85a30" stroke-width="0.5"/>
