<svg width="680" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif;">
<!-- Sub-buttons System — v3.1+ Sectioned Schema -->
<text font-size="15" font-weight="500" fill="#1a1a1a" x="40" y="32" text-anchor="start" font-family="sans-serif">Sub-buttons — v3.1+ sectioned schema</text>
<text font-size="12" font-weight="normal" fill="#666" x="332" y="32" text-anchor="start" font-family="sans-serif">(button, media-player, climate, cover, select, separator, calendar)</text>
<rect x="40" y="48" width="280" height="200" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
<text font-size="11" font-weight="500" fill="#1a1a1a" x="50" y="64" text-anchor="start" font-family="sans-serif">✅  Always use this schema:</text>
<text font-size="10" font-weight="normal" fill="#1a1a1a" x="50" y="80" text-anchor="start" font-family="monospace">sub_button:</text>
<text font-size="10" font-weight="normal" fill="#185fa5" x="50" y="94" text-anchor="start" font-family="monospace">  main_layout: inline</text>
<text font-size="10" font-weight="normal" fill="#185fa5" x="50" y="108" text-anchor="start" font-family="monospace">  bottom_layout: inline</text>
<text font-size="10" font-weight="normal" fill="#1a1a1a" x="50" y="122" text-anchor="start" font-family="monospace">  main:</text>
<text font-size="10" font-weight="normal" fill="#0f6e56" x="50" y="136" text-anchor="start" font-family="monospace">    - entity: light.desk</text>
<text font-size="10" font-weight="normal" fill="#0f6e56" x="50" y="150" text-anchor="start" font-family="monospace">      name: Desk</text>
<text font-size="10" font-weight="normal" fill="#854f0b" x="50" y="164" text-anchor="start" font-family="monospace">    - group:</text>
<text font-size="10" font-weight="normal" fill="#854f0b" x="50" y="178" text-anchor="start" font-family="monospace">        - entity: light.a</text>
<text font-size="10" font-weight="normal" fill="#854f0b" x="50" y="192" text-anchor="start" font-family="monospace">      buttons_layout: inline</text>
<text font-size="10" font-weight="normal" fill="#1a1a1a" x="50" y="206" text-anchor="start" font-family="monospace">  bottom:</text>
<text font-size="10" font-weight="normal" fill="#7a1fad" x="50" y="220" text-anchor="start" font-family="monospace">    - entity: sensor.temp</text>
<text font-size="10" font-weight="normal" fill="#7a1fad" x="50" y="234" text-anchor="start" font-family="monospace">      justify_content: center</text>
<rect x="330" y="48" width="280" height="200" rx="6" fill="#fff5f5" stroke="#f87171" stroke-width="0.5"/>
<text font-size="11" font-weight="500" fill="#c0392b" x="340" y="64" text-anchor="start" font-family="sans-serif">❌  Legacy — do not use:</text>
<text font-size="10" font-weight="normal" fill="#c0392b" x="340" y="80" text-anchor="start" font-family="monospace">sub_button:</text>
<text font-size="10" font-weight="normal" fill="#c0392b" x="340" y="94" text-anchor="start" font-family="monospace">  - entity: light.desk</text>
<text font-size="10" font-weight="normal" fill="#c0392b" x="340" y="108" text-anchor="start" font-family="monospace">    name: Desk</text>
<text font-size="10" font-weight="normal" fill="#c0392b" x="340" y="122" text-anchor="start" font-family="monospace">  - entity: light.b</text>
<text font-size="10" font-weight="normal" fill="#c0392b" x="340" y="136" text-anchor="start" font-family="monospace">    name: B</text>
<text font-size="10" font-weight="normal" fill="#888" x="340" y="160" text-anchor="start" font-family="sans-serif">Flat array lacks top/bottom</text>
<text font-size="10" font-weight="normal" fill="#888" x="340" y="174" text-anchor="start" font-family="sans-serif">zones, groups, and alignment</text>
<text font-size="10" font-weight="normal" fill="#888" x="340" y="188" text-anchor="start" font-family="sans-serif">lanes. Not supported in v3.1+.</text>
<line x1="40" y1="264" x2="638" y2="264" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
<text font-size="13" font-weight="500" fill="#1a1a1a" x="40" y="290" text-anchor="start" font-family="sans-serif">DOM structure produced by sectioned schema</text>
<rect x="40" y="304" width="580" height="350" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
<text font-size="11" font-weight="normal" fill="#534ab7" x="50" y="320" text-anchor="start" font-family="sans-serif">.bubble-wrapper  (card wrapper)</text>
<rect x="52" y="328" width="556" height="30" rx="4" fill="#f5f5f0" stroke="#aaaaaa" stroke-width="0.5"/>
<text font-size="10" font-weight="normal" fill="#555" x="330" y="346" text-anchor="middle" font-family="sans-serif">[base card content — icon, name, background, buttons]</text>
<rect x="52" y="368" width="556" height="100" rx="6" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
<text font-size="10" font-weight="normal" fill="#854f0b" x="60" y="384" text-anchor="start" font-family="sans-serif">.bubble-sub-button-container  [.groups-layout-inline | .groups-layout-rows]  [.fixed-top]</text>
<rect x="60" y="392" width="260" height="66" rx="4" fill="#e6f1fb" stroke="#378add" stroke-width="0.5"/>
<text font-size="9" font-weight="normal" fill="#185fa5" x="190" y="408" text-anchor="middle" font-family="sans-serif">.bubble-sub-button-group  .position-top  .display-inline</text>
<text font-size="9" font-weight="normal" fill="#888" x="190" y="422" text-anchor="middle" font-family="sans-serif">[data-group-id=g_main_0]  ← explicit group</text>
<rect x="66" y="430" width="72" height="22" rx="3" fill="#faece7" stroke="#d85a30" stroke-width="0.5"/>
<text font-size="8" font-weight="normal" fill="#993c1d" x="102" y="444" text-anchor="middle" font-family="sans-serif">.bubble-sub-button-1</text>
<rect x="148" y="430" width="72" height="22" rx="3" fill="#faece7" stroke="#d85a30" stroke-width="0.5"/>
<text font-size="8" font-weight="normal" fill="#993c1d" x="184" y="444" text-anchor="middle" font-family="sans-serif">.bubble-sub-button-2</text>
<rect x="230" y="430" width="72" height="22" rx="3" fill="#faece7" stroke="#d85a30" stroke-width="0.5"/>
<text font-size="8" font-weight="normal" fill="#993c1d" x="266" y="444" text-anchor="middle" font-family="sans-serif">.bubble-sub-button-3</text>
<rect x="330" y="392" width="268" height="66" rx="4" fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.5"/>
<text font-size="9" font-weight="normal" fill="#0f6e56" x="464" y="408" text-anchor="middle" font-family="sans-serif">.bubble-sub-button-group  .position-top</text>
<text font-size="9" font-weight="normal" fill="#888" x="464" y="422" text-anchor="middle" font-family="sans-serif">[data-group-id=g_main_auto]  ← auto group</text>
<rect x="338" y="430" width="120" height="22" rx="3" fill="#faece7" stroke="#d85a30" stroke-width="0.5"/>
<text font-size="8" font-weight="normal" fill="#993c1d" x="398" y="444" text-anchor="middle" font-family="sans-serif">.bubble-sub-button-4</text>
<rect x="52" y="478" width="556" height="166" rx="6" fill="#f0e6fb" stroke="#a855d8" stroke-width="0.5"/>
<text font-size="10" font-weight="normal" fill="#7a1fad" x="60" y="494" text-anchor="start" font-family="sans-serif">.bubble-sub-button-bottom-container  [.groups-layout-inline]  [.alignment-lanes-active]</text>
<rect x="60" y="502" width="126" height="128" rx="4" fill="#fafafa" stroke="#639922" stroke-width="0.5"/>
<text font-size="9" font-weight="normal" fill="#3b6d11" x="123" y="518" text-anchor="middle" font-family="sans-serif">.lane-start</text>
<text font-size="9" font-weight="normal" fill="#888" x="123" y="530" text-anchor="middle" font-family="sans-serif">(order:1)</text>
<rect x="64" y="538" width="118" height="36" rx="3" fill="#f5f5f0" stroke="#aaaaaa" stroke-width="0.5"/>
<text font-size="8" font-weight="normal" fill="#3b6d11" x="123" y="552" text-anchor="middle" font-family="sans-serif">.bubble-sub-button-group</text>
<text font-size="8" font-weight="normal" fill="#3b6d11" x="123" y="564" text-anchor="middle" font-family="sans-serif">.alignment-start</text>
<rect x="64" y="580" width="118" height="40" rx="3" fill="#fffbe6" stroke="#c8a020" stroke-width="0.5"/>
<text font-size="8" font-weight="normal" fill="#c8a020" x="123" y="600" text-anchor="middle" font-family="sans-serif">.bubble-sub-button ×N</text>
<text font-size="8" font-weight="normal" fill="#888" x="123" y="614" text-anchor="middle" font-family="sans-serif">.&lt;name-class&gt;</text>
<rect x="196" y="502" width="126" height="128" rx="4" fill="#fafafa" stroke="#378add" stroke-width="0.5"/>
<text font-size="9" font-weight="normal" fill="#185fa5" x="259" y="518" text-anchor="middle" font-family="sans-serif">.lane-center</text>
<text font-size="9" font-weight="normal" fill="#888" x="259" y="530" text-anchor="middle" font-family="sans-serif">(order:2)</text>
<rect x="200" y="538" width="118" height="36" rx="3" fill="#f5f5f0" stroke="#aaaaaa" stroke-width="0.5"/>
<text font-size="8" font-weight="normal" fill="#185fa5" x="259" y="552" text-anchor="middle" font-family="sans-serif">.bubble-sub-button-group</text>
<text font-size="8" font-weight="normal" fill="#185fa5" x="259" y="564" text-anchor="middle" font-family="sans-serif">.alignment-center</text>
<rect x="200" y="580" width="118" height="40" rx="3" fill="#fffbe6" stroke="#c8a020" stroke-width="0.5"/>
<text font-size="8" font-weight="normal" fill="#c8a020" x="259" y="600" text-anchor="middle" font-family="sans-serif">.bubble-sub-button ×N</text>
<text font-size="8" font-weight="normal" fill="#888" x="259" y="614" text-anchor="middle" font-family="sans-serif">.&lt;name-class&gt;</text>
<rect x="332" y="502" width="126" height="128" rx="4" fill="#fafafa" stroke="#ba7517" stroke-width="0.5"/>
<text font-size="9" font-weight="normal" fill="#854f0b" x="395" y="518" text-anchor="middle" font-family="sans-serif">.lane-fill</text>
<text font-size="9" font-weight="normal" fill="#888" x="395" y="530" text-anchor="middle" font-family="sans-serif">(order:3)</text>
<rect x="336" y="538" width="118" height="36" rx="3" fill="#f5f5f0" stroke="#aaaaaa" stroke-width="0.5"/>
<text font-size="8" font-weight="normal" fill="#854f0b" x="395" y="552" text-anchor="middle" font-family="sans-serif">.bubble-sub-button-group</text>
<text font-size="8" font-weight="normal" fill="#854f0b" x="395" y="564" text-anchor="middle" font-family="sans-serif">.alignment-fill</text>
<rect x="336" y="580" width="118" height="40" rx="3" fill="#fffbe6" stroke="#c8a020" stroke-width="0.5"/>
<text font-size="8" font-weight="normal" fill="#c8a020" x="395" y="600" text-anchor="middle" font-family="sans-serif">.bubble-sub-button ×N</text>
<text font-size="8" font-weight="normal" fill="#888" x="395" y="614" text-anchor="middle" font-family="sans-serif">.&lt;name-class&gt;</text>
<rect x="468" y="502" width="126" height="128" rx="4" fill="#fafafa" stroke="#a855d8" stroke-width="0.5"/>
<text font-size="9" font-weight="normal" fill="#7a1fad" x="531" y="518" text-anchor="middle" font-family="sans-serif">.lane-end</text>
<text font-size="9" font-weight="normal" fill="#888" x="531" y="530" text-anchor="middle" font-family="sans-serif">(order:4)</text>
<rect x="472" y="538" width="118" height="36" rx="3" fill="#f5f5f0" stroke="#aaaaaa" stroke-width="0.5"/>
<text font-size="8" font-weight="normal" fill="#7a1fad" x="531" y="552" text-anchor="middle" font-family="sans-serif">.bubble-sub-button-group</text>
<text font-size="8" font-weight="normal" fill="#7a1fad" x="531" y="564" text-anchor="middle" font-family="sans-serif">.alignment-end</text>
<rect x="472" y="580" width="118" height="40" rx="3" fill="#fffbe6" stroke="#c8a020" stroke-width="0.5"/>
<text font-size="8" font-weight="normal" fill="#c8a020" x="531" y="600" text-anchor="middle" font-family="sans-serif">.bubble-sub-button ×N</text>
<text font-size="8" font-weight="normal" fill="#888" x="531" y="614" text-anchor="middle" font-family="sans-serif">.&lt;name-class&gt;</text>
<line x1="40" y1="668" x2="638" y2="668" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
<text font-size="12" font-weight="500" fill="#1a1a1a" x="40" y="690" text-anchor="start" font-family="sans-serif">Auto-grouping rules:</text>
<text font-size="10" font-weight="normal" fill="#333" x="50" y="708" text-anchor="start" font-family="sans-serif">• main non-group items → g_main_auto when main_layout:rows, or when explicit groups exist, or when any bottom items exist</text>
<text font-size="10" font-weight="normal" fill="#333" x="50" y="724" text-anchor="start" font-family="sans-serif">• bottom non-group items → g_bottom_auto (all together) unless mixed with explicit bottom groups</text>
<text font-size="10" font-weight="normal" fill="#333" x="50" y="740" text-anchor="start" font-family="sans-serif">• mixed bottom case → each non-group item gets its own g_bottom_individual_N group to preserve YAML order</text>
<rect x="40" y="760" width="580" height="32" rx="6" fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.5"/>
<text font-size="10" font-weight="normal" fill="#0f6e56" x="50" y="775" text-anchor="start" font-family="sans-serif">justify_content values:  fill (default) → .alignment-fill  |  start → .alignment-start  |  center → .alignment-center  |  end → .alignment-end</text>
<text font-size="10" font-weight="normal" fill="#888" x="50" y="789" text-anchor="start" font-family="sans-serif">space-between / space-around / space-evenly / stretch → .alignment-fill   (all map to fill)</text>
</svg>
